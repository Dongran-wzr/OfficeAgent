server:
  port: 8080

spring:
  application:
    name: office-agent
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/office_agent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: password # Replace with your password
  
  # Spring AI Configuration (Placeholders)
  ai:
    openai:
      api-key: sk-placeholder
      base-url: https://api.openai.com
    # Alibaba Configuration (Example)
    # alibaba:
    #   dashscope:
    #     api-key: your-dashscope-key

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.officeagent: DEBUG
