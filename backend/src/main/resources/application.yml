server:
  port: 8081

spring:
  application:
    name: office-agent
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/office_agent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 12345678 # Replace with your password
  
  # Spring AI Configuration - Only OpenAI
  ai:
    openai:
      api-key: sk-placeholder  # 请替换为您的OpenAI API Key
      base-url: https://api.openai.com

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.officeagent: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG

minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucketName: officeagent
  publicUrl: http://localhost:9000